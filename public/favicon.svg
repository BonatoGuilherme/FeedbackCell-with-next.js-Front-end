<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Fundo -->
  <rect width="200" height="200" fill="#4CAF50" rx="40"/>
  
  <!-- Celular -->
  <g transform="translate(50, 40)">
    <!-- Corpo do celular -->
    <rect x="10" y="0" width="80" height="120" rx="8" fill="#333" stroke="#000" stroke-width="2"/>
    
    <!-- Tela -->
    <rect x="15" y="8" width="70" height="95" rx="5" fill="#00ff00"/>
    
    <!-- Linhas de feedback (comentários) -->
    <line x1="20" y1="20" x2="80" y2="20" stroke="#333" stroke-width="2"/>
    <line x1="20" y1="28" x2="70" y2="28" stroke="#333" stroke-width="1.5"/>
    <line x1="20" y1="35" x2="75" y2="35" stroke="#333" stroke-width="1.5"/>
    
    <line x1="20" y1="48" x2="80" y2="48" stroke="#333" stroke-width="2"/>
    <line x1="20" y1="56" x2="70" y2="56" stroke="#333" stroke-width="1.5"/>
    <line x1="20" y1="63" x2="75" y2="63" stroke="#333" stroke-width="1.5"/>
    
    <line x1="20" y1="76" x2="80" y2="76" stroke="#333" stroke-width="2"/>
    <line x1="20" y1="84" x2="70" y2="84" stroke="#333" stroke-width="1.5"/>
    
    <!-- Home button -->
    <circle cx="50" cy="108" r="3" fill="#666"/>
  </g>
  
  <!-- Ícone de comentário (💬) -->
  <g transform="translate(120, 80)">
    <path d="M 5 2 Q 2 2 2 5 L 2 18 Q 2 20 5 20 L 18 20 L 22 25 L 18 20 L 18 20 Q 20 20 20 18 L 20 5 Q 20 2 18 2 Z" 
          fill="#FFD700" stroke="#333" stroke-width="1.5"/>
  </g>
</svg>
